<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MICKSTER TV | Admin Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --green: #00E676; --bg: #05080a; --card: #0f141a; --input: #161d24; --text-grey: #94a3b8; --danger: #ff3b30; --blue: #3182ce; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg); color: white; min-height: 100vh; }
        .hidden { display: none !important; }
        #login-page { height: 100vh; display: flex; align-items: center; justify-content: center; background: radial-gradient(circle at center, #111, #05080a); }
        .login-box { background: var(--card); padding: 40px; border-radius: 20px; width: 90%; max-width: 400px; border: 1px solid rgba(0, 230, 118, 0.2); text-align: center; }
        .login-box input { width: 100%; padding: 15px; margin-bottom: 20px; background: var(--input); border: 1px solid #222; border-radius: 12px; color: white; outline: none; }
        .login-box button { width: 100%; padding: 15px; background: var(--green); border: none; border-radius: 12px; font-weight: bold; cursor: pointer; }
        #admin-layout { display: flex; min-height: 100vh; }
        .sidebar { width: 260px; background: #070a0d; border-right: 1px solid rgba(255,255,255,0.05); padding: 20px; position: fixed; height: 100vh; }
        .nav-item { padding: 15px; color: var(--text-grey); display: flex; align-items: center; gap: 12px; border-radius: 12px; cursor: pointer; margin-bottom: 8px; }
        .nav-item.active { background: rgba(0, 230, 118, 0.1); color: var(--green); }
        .main-content { margin-left: 260px; flex: 1; padding: 40px; }
        .panel { background: var(--card); padding: 25px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.05); margin-bottom: 30px; }
        .panel-title { border-left: 4px solid var(--green); padding-left: 15px; margin-bottom: 25px; }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; color: var(--text-grey); padding: 15px; border-bottom: 1px solid #222; font-size: 13px; }
        td { padding: 15px; border-bottom: 1px solid #1a1a1a; font-size: 14px; }
        .form-group { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        input, select { background: var(--input); border: 1px solid #222; padding: 12px; border-radius: 10px; color: white; outline: none; }
        .btn-add { background: var(--green); color: black; padding: 12px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
        .btn-del { background: var(--danger); color: white; padding: 8px 12px; border-radius: 6px; border: none; cursor: pointer; font-size: 11px; }
        .badge { padding: 4px 8px; border-radius: 5px; font-size: 10px; font-weight: bold; }
        .badge-personal { background: rgba(49, 130, 206, 0.1); color: var(--blue); }
        .badge-public { background: rgba(0, 230, 118, 0.1); color: var(--green); }
    </style>
</head>
<body>

    <div id="login-page">
        <div class="login-box">
            <h2>MICKSTER ADMIN</h2>
            <input type="text" id="user-in" placeholder="Username">
            <input type="password" id="pass-in" placeholder="Password">
            <button onclick="checkLogin()">INGIA</button>
        </div>
    </div>

    <div id="admin-layout" class="hidden">
        <div class="sidebar">
            <h2 style="color:var(--green); text-align:center; margin-bottom:40px;">MICKSTER TV</h2>
            <div class="nav-item active" onclick="showTab('dash', this)"><i class="fa-solid fa-chart-line"></i> Dashboard</div>
            <div class="nav-item" onclick="showTab('tokens', this)"><i class="fa-solid fa-key"></i> Token Manager</div>
            <div class="nav-item" onclick="showTab('users', this)"><i class="fa-solid fa-users"></i> Manage Users</div>
            <div class="nav-item" onclick="showTab('channels', this)"><i class="fa-solid fa-tv"></i> Channels</div>
            <div class="nav-item" onclick="showTab('slides', this)"><i class="fa-solid fa-images"></i> Slides</div>
        </div>

        <div class="main-content">
            <h1 id="tab-title" style="margin-bottom:30px;">DASHBOARD</h1>

            <div id="tab-dash" class="tab-content">
                <div style="display:grid; grid-template-columns: repeat(3, 1fr); gap:20px;">
                    <div class="panel"><h4>Channels</h4><p id="stat-chan-count" style="font-size:24px; color:var(--green)">0</p></div>
                    <div class="panel"><h4>Tokens</h4><p id="stat-token-count" style="font-size:24px; color:var(--green)">0</p></div>
                    <div class="panel"><h4>Total Users</h4><p id="stat-user-count" style="font-size:24px; color:var(--green)">0</p></div>
                </div>
            </div>

            <div id="tab-tokens" class="tab-content hidden">
                <div class="panel">
                    <h3 class="panel-title">Tengeneza Token</h3>
                    <div class="form-group" style="grid-template-columns: 1.5fr 1fr 1fr 1fr;">
                        <input type="text" id="token-user-select" placeholder="Jina la Mteja">
                        <select id="token-type"><option value="Personal">Personal</option><option value="Public">Public</option></select>
                        <select id="token-days"><option value="3">3 Days</option><option value="7">1 Week</option><option value="30">1 Month</option></select>
                        <button class="btn-add" onclick="generateToken()">GENERATE</button>
                    </div>
                    <table>
                        <thead><tr><th>Key</th><th>Type</th><th>User</th><th>Expiry</th><th>Action</th></tr></thead>
                        <tbody id="token-list-body"></tbody>
                    </table>
                </div>
            </div>

            <div id="tab-users" class="tab-content hidden">
                <div class="panel">
                    <h3 class="panel-title">Registered Users</h3>
                    <table>
                        <thead><tr><th>Username / Phone</th><th>Status</th><th>Action</th></tr></thead>
                        <tbody id="user-list-body"></tbody>
                    </table>
                </div>
            </div>

            <div id="tab-channels" class="tab-content hidden">
                <div class="panel">
                    <h3 class="panel-title">Add Channel</h3>
                    <div class="form-group"><input type="text" id="chan-name" placeholder="Name"><input type="text" id="chan-icon" placeholder="Icon URL"><input type="text" id="chan-link" placeholder="M3U8 Link"></div>
                    <button class="btn-add" onclick="saveChannel()">SAVE</button>
                    <table style="margin-top:20px;">
                        <thead><tr><th>Icon</th><th>Name</th><th>Action</th></tr></thead>
                        <tbody id="channel-list-body"></tbody>
                    </table>
                </div>
            </div>

            <div id="tab-slides" class="tab-content hidden">
                <div class="panel">
                    <h3 class="panel-title">Home Slides</h3>
                    <div class="form-group"><input type="text" id="slide-url" placeholder="Image URL"><input type="text" id="slide-caption" placeholder="Caption"></div>
                    <button class="btn-add" onclick="saveSlide()">ADD SLIDE</button>
                    <table style="margin-top:20px;">
                        <thead><tr><th>Image</th><th>Caption</th><th>Action</th></tr></thead>
                        <tbody id="slide-list-body"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyDiNjWTVcqZYsiHDWyxvU35qoAakwhFZKk", databaseURL: "https://mickster-tv-default-rtdb.firebaseio.com" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function checkLogin() {
            if(document.getElementById('user-in').value === "Mickster19" && document.getElementById('pass-in').value === "$120") {
                document.getElementById('login-page').classList.add('hidden');
                document.getElementById('admin-layout').classList.remove('hidden');
                loadAllData();
            }
        }

        function showTab(id, el) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.add('hidden'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById('tab-' + id).classList.remove('hidden');
            el.classList.add('active');
            document.getElementById('tab-title').innerText = id.toUpperCase();
        }

        function generateToken() {
            const user = document.getElementById('token-user-select').value || "Guest";
            const type = document.getElementById('token-type').value;
            const days = parseInt(document.getElementById('token-days').value);
            const key = "MICK-" + Math.random().toString(36).substr(2, 6).toUpperCase();
            const exp = new Date(); exp.setDate(exp.getDate() + days);
            db.ref('tokens').push({ key, type, user, expiry: exp.toLocaleDateString('en-GB') });
        }

        function saveChannel() {
            const name = document.getElementById('chan-name').value;
            const icon = document.getElementById('chan-icon').value;
            const link = document.getElementById('chan-link').value;
            if(name && link) db.ref('channels').push({name, icon, link});
        }

        function saveSlide() {
            const url = document.getElementById('slide-url').value;
            const cap = document.getElementById('slide-caption').value;
            if(url) db.ref('slides').push({url, cap});
        }

        function loadAllData() {
            // Load Tokens
            db.ref('tokens').on('value', snap => {
                const body = document.getElementById('token-list-body'); body.innerHTML = "";
                let count = 0;
                snap.forEach(c => {
                    count++; const t = c.val();
                    body.innerHTML += `<tr><td>${t.key}</td><td><span class="badge ${t.type==='Public'?'badge-public':'badge-personal'}">${t.type}</span></td><td>${t.user}</td><td>${t.expiry}</td><td><button class="btn-del" onclick="db.ref('tokens/${c.key}').remove()">Futa</button></td></tr>`;
                });
                document.getElementById('stat-token-count').innerText = count;
            });

            // Load Users (Imerudishwa)
            db.ref('users').on('value', snap => {
                const body = document.getElementById('user-list-body'); body.innerHTML = "";
                let count = 0;
                snap.forEach(c => {
                    count++; const u = c.val();
                    body.innerHTML += `<tr><td><b>${u.phone || 'Unknown'}</b></td><td><span style="color:var(--green)">Active</span></td><td><button class="btn-del" onclick="db.ref('users/${c.key}').remove()">Futa</button></td></tr>`;
                });
                document.getElementById('stat-user-count').innerText = count;
            });

            // Load Channels & Slides
            db.ref('channels').on('value', snap => {
                const body = document.getElementById('channel-list-body'); body.innerHTML = "";
                let count = 0;
                snap.forEach(c => { count++; const v = c.val(); body.innerHTML += `<tr><td><img src="${v.icon}" width="30"></td><td>${v.name}</td><td><button class="btn-del" onclick="db.ref('channels/${c.key}').remove()">Futa</button></td></tr>`; });
                document.getElementById('stat-chan-count').innerText = count;
            });

            db.ref('slides').on('value', snap => {
                const body = document.getElementById('slide-list-body'); body.innerHTML = "";
                snap.forEach(c => { const v = c.val(); body.innerHTML += `<tr><td><img src="${v.url}" height="30"></td><td>${v.cap}</td><td><button class="btn-del" onclick="db.ref('slides/${c.key}').remove()">Futa</button></td></tr>`; });
            });
        }
    </script>
</body>
</html>
